<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Connaissez-vous vraiment Tite Fifille ?</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink:    #FF6B9D;
  --pink2:   #ff4081;
  --purple:  #9C27B0;
  --gold:    #FFD700;
  --cream:   #FFF8F0;
  --dark:    #2a1a2e;
  --A: #E8412A;
  --B: #2980E8;
  --C: #F0A500;
  --D: #1DA85C;
  --surface: rgba(255,255,255,0.12);
  --border:  rgba(255,255,255,0.2);
}

html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--dark); }
#app { min-height: 100vh; }

/* MOSAIC BACKGROUND */
.mosaic-bg {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.mosaic-bg .photo-tile {
  position: absolute;
  width: 200px; height: 200px;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid rgba(255,255,255,0.6);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: transform 0.3s;
}
.mosaic-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(135deg, 
    rgba(100,20,60,0.72) 0%, 
    rgba(42,26,46,0.65) 40%, 
    rgba(80,30,80,0.72) 100%);
  pointer-events: none;
}
.page-content { position: relative; z-index: 2; }

/* COMMON */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  padding: .75rem 1.75rem; border: none; border-radius: 50px;
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
  cursor: pointer; transition: transform .15s, box-shadow .15s, opacity .15s;
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.3); }
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-pink   { background: linear-gradient(135deg, var(--pink), var(--pink2)); color: white; }
.btn-gold   { background: linear-gradient(135deg, #FFD700, #FFA500); color: var(--dark); font-weight: 900; }
.btn-ghost  { background: var(--surface); color: white; border: 1.5px solid var(--border); backdrop-filter: blur(6px); }
.btn-big    { padding: 1rem 2.5rem; font-size: 1.15rem; }

.hdr {
  background: rgba(0,0,0,.35); backdrop-filter: blur(10px);
  padding: .7rem 1.5rem; display: flex; align-items: center;
  justify-content: space-between; gap: 1rem; flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.hdr-logo { font-family: 'Pacifico', cursive; color: var(--gold); font-size: 1rem; }
.body-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }

input[type=text], textarea {
  width: 100%; padding: .7rem .9rem;
  background: rgba(255,255,255,.1); border: 1.5px solid var(--border);
  border-radius: 12px; color: white; font-family: 'Nunito', sans-serif;
  font-size: .95rem; transition: border-color .2s;
}
input[type=text]:focus, textarea:focus { outline: none; border-color: var(--gold); }
input[type=text]::placeholder, textarea::placeholder { color: rgba(255,255,255,.3); }
label { display: block; color: var(--gold); font-size: .8rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: .4rem; }

/* LANDING */
.landing {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 2rem;
}
.landing-title {
  font-family: 'Pacifico', cursive; font-size: 2.2rem; color: var(--gold);
  text-align: center; line-height: 1.3; margin-bottom: .5rem;
  text-shadow: 0 2px 20px rgba(255,215,0,.4);
}
.landing-sub  { color: rgba(255,255,255,.6); font-size: .95rem; margin-bottom: 2.5rem; text-align: center; }
.landing-card {
  background: rgba(42,26,46,.7); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,215,0,.2); border-radius: 24px;
  padding: 2rem; width: 100%; max-width: 380px;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
}
.landing-card .btn { width: 100%; margin-bottom: .75rem; }
.sep { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; color: rgba(255,255,255,.2); font-size: .8rem; }
.sep::before, .sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.join-row { display: flex; gap: .5rem; }
.join-row input { flex: 1; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

/* PHOTO STRIP on landing */
.photo-strip {
  display: flex; gap: 8px; margin-bottom: 1.5rem;
  max-width: 420px; overflow: hidden;
}
.photo-strip img {
  width: 80px; height: 80px; object-fit: cover; border-radius: 12px;
  border: 2px solid rgba(255,215,0,.3);
  flex-shrink: 0;
}

/* EDITOR */
.editor-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.sidebar { background: rgba(0,0,0,.3); backdrop-filter: blur(8px); border-right: 1px solid var(--border); overflow-y: auto; padding: 1rem .75rem; }
.sidebar-title { color: var(--gold); font-size: .75rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: .25rem .5rem .75rem; border-bottom: 1px solid var(--border); margin-bottom: .5rem; }
.q-item { padding: .55rem .75rem; border-radius: 50px; cursor: pointer; color: rgba(255,255,255,.6); font-size: .85rem; margin-bottom: 2px; display: flex; align-items: center; gap: .5rem; transition: all .15s; white-space: nowrap; overflow: hidden; }
.q-item:hover { background: var(--surface); color: white; }
.q-item.active { background: linear-gradient(135deg, var(--pink), var(--purple)); color: white; font-weight: 800; }
.q-item .q-num { opacity: .5; font-size: .75rem; min-width: 22px; }
.q-item .q-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.q-item .q-tick { color: var(--D); flex-shrink: 0; }
.q-item.active .q-tick { color: white; }
.editor-panel { padding: 2rem; overflow-y: auto; }
.e-card { background: rgba(42,26,46,.8); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; max-width: 680px; }
.e-card h3 { font-family: 'Nunito', sans-serif; color: white; font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; }
.form-row { margin-bottom: 1.25rem; }
.photo-drop { border: 2px dashed rgba(255,215,0,.2); border-radius: 14px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all .2s; color: rgba(255,255,255,.4); font-size: .9rem; }
.photo-drop:hover { border-color: var(--gold); background: rgba(255,215,0,.05); }
.photo-drop img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; }
.choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
.choice-row { display: flex; align-items: center; gap: .5rem; }
.choice-badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; font-size: .85rem; flex-shrink: 0; }
.choice-row input { flex: 1; }
.choice-radio { width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; flex-shrink: 0; }
.e-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.e-header { background: rgba(0,0,0,.4); backdrop-filter: blur(8px); padding: .7rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }

/* HOST */
.q-screen { min-height: 100vh; display: flex; flex-direction: column; }
.progress-bar { height: 5px; background: rgba(255,255,255,.1); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--gold)); transition: width 1s linear; }
.q-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
.q-photo-host { max-height: 250px; width:100%; object-fit: contain; border-radius: 14px; background: rgba(0,0,0,.3); }
.photos-row { display:flex; gap:.6rem; width:100%; max-width:820px; justify-content:center; align-items:center; margin-bottom:1rem; }
.photos-row img { flex:1; min-width:0; max-height:250px; object-fit:contain; border-radius:12px; background:rgba(0,0,0,.3); }
.q-text-host { color: white; font-family: 'Nunito', sans-serif; font-size: 1.7rem; font-weight: 800; text-align: center; margin-bottom: 1.5rem; line-height: 1.3; max-width: 820px; }
.answers-host { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; width: 100%; max-width: 820px; }
.ans-host { padding: .9rem 1.2rem; border-radius: 14px; display: flex; align-items: center; gap: .75rem; color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; }
.ans-A { background: var(--A); } .ans-B { background: var(--B); } .ans-C { background: var(--C); } .ans-D { background: var(--D); }
.ans-photo { flex-direction:column; padding:.5rem; align-items:center; justify-content:flex-start; min-height:140px; }
.ans-photo img { width:100%; height:100px; object-fit:contain; border-radius:8px; background:rgba(0,0,0,.25); }
.ans-photo .ans-label { font-size:.85rem; margin-top:.3rem; text-align:center; }
.p-btn-photo { flex-direction:column; min-height:110px; padding:.5rem; }
.p-btn-photo img { width:100%; height:70px; object-fit:contain; border-radius:8px; background:rgba(0,0,0,.2); }
.p-btn-photo .p-label { font-size:.8rem; margin-top:.25rem; text-align:center; line-height:1.2; }
.photo-choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; padding:.5rem; flex:1; }
.photo-choice-btn { border:none; border-radius:14px; padding:.4rem; cursor:pointer; position:relative; overflow:hidden; transition:transform .1s,box-shadow .2s; background:rgba(0,0,0,.2); }
.photo-choice-btn:active { transform:scale(.96); }
.photo-choice-btn img { width:100%; height:100%; object-fit:contain; border-radius:10px; display:block; }
.photo-choice-btn .choice-corner { position:absolute; top:6px; left:6px; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.8rem; color:white; }
.photo-choice-btn.selected { box-shadow:0 0 0 4px white; }
.photo-choice-btn:disabled { cursor:not-allowed; }
.photo-choice-btn.voted { opacity:.45; }
.photo-choice-btn.selected.voted { opacity:1; }
.ans-icon { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
.vote-ticker { color: rgba(255,255,255,.5); text-align: center; margin-top: .75rem; font-size: .9rem; }
.timer-badge { background: rgba(0,0,0,.4); border: 2px solid rgba(255,215,0,.4); border-radius: 50px; padding: .3rem .9rem; font-family: 'Nunito', sans-serif; font-weight: 900; color: var(--gold); font-size: 1.3rem; transition: color .3s; }
.timer-badge.urgent { color: var(--A); border-color: var(--A); }

/* RESULTS */
.results-wrap { width: 100%; max-width: 720px; }
.result-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .5rem; }
.result-letter { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; flex-shrink: 0; }
.result-track { flex: 1; background: rgba(255,255,255,.08); border-radius: 50px; height: 44px; overflow: hidden; }
.result-bar { height: 100%; border-radius: 50px; display: flex; align-items: center; padding: 0 .75rem; color: white; font-weight: 800; font-size: .9rem; transition: width .8s cubic-bezier(.4,0,.2,1); white-space: nowrap; }
.result-n { color: rgba(255,255,255,.6); min-width: 28px; text-align: right; }
.correct-tag { background: var(--D); color: white; font-size: .75rem; font-weight: 700; padding: .15rem .6rem; border-radius: 50px; margin-left: .5rem; }

/* LEADERBOARD */
.lb-wrap { width: 100%; max-width: 560px; }
.lb-title { font-family: 'Pacifico', cursive; color: var(--gold); font-size: 2rem; text-align: center; margin-bottom: 1.25rem; text-shadow: 0 2px 15px rgba(255,215,0,.4); }
.lb-row { display: flex; align-items: center; gap: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: .7rem 1rem; margin-bottom: .4rem; backdrop-filter: blur(6px); }
.lb-row.gold   { background: rgba(255,215,0,.15); border-color: rgba(255,215,0,.4); }
.lb-row.silver { background: rgba(192,192,192,.1); border-color: rgba(192,192,192,.25); }
.lb-row.bronze { background: rgba(205,127,50,.1); border-color: rgba(205,127,50,.25); }
.lb-rank { font-weight: 900; color: var(--gold); min-width: 36px; font-size: 1.1rem; }
.lb-name { flex: 1; color: white; font-weight: 700; }
.lb-score { font-weight: 900; color: var(--gold); font-size: 1.1rem; }

/* WAITING ROOM */
.waiting-center { text-align: center; }
.qr-box { background: white; display: inline-block; padding: 1rem; border-radius: 16px; margin: 1rem 0; box-shadow: 0 0 40px rgba(255,215,0,.3), 0 0 0 4px rgba(255,215,0,.2); }
.session-url { color: rgba(255,255,255,.35); font-size: .8rem; margin-bottom: 1rem; word-break: break-all; }
.chips-wrap { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; max-width: 600px; margin: .75rem auto; }
.participant-bubble {
  position: absolute;
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  animation: bubbleIn .5s cubic-bezier(.34,1.56,.64,1) both;
  pointer-events: none;
}
.participant-bubble img {
  width: 70px; height: 70px; object-fit: cover; border-radius: 50%;
  border: 3px solid var(--gold); box-shadow: 0 4px 16px rgba(0,0,0,.5);
}
.participant-bubble .p-bubble-name {
  color: white; font-size: .75rem; font-weight: 700;
  background: rgba(0,0,0,.5); padding: .15rem .5rem;
  border-radius: 20px; backdrop-filter: blur(4px);
  max-width: 90px; text-align: center; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.bubble-arena {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1;
}
@keyframes float0 { 0%,100%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(8px,-10px) rotate(2deg)} 50%{transform:translate(-5px,8px) rotate(-1deg)} 75%{transform:translate(10px,5px) rotate(1.5deg)} }
@keyframes float1 { 0%,100%{transform:translate(0,0) rotate(0deg)} 30%{transform:translate(-10px,-8px) rotate(-2deg)} 60%{transform:translate(7px,10px) rotate(1deg)} 80%{transform:translate(-8px,-5px) rotate(-1.5deg)} }
@keyframes float2 { 0%,100%{transform:translate(0,0) rotate(0deg)} 20%{transform:translate(6px,10px) rotate(1deg)} 55%{transform:translate(-9px,-7px) rotate(-2deg)} 85%{transform:translate(5px,-9px) rotate(1deg)} }
@keyframes float3 { 0%,100%{transform:translate(0,0)} 35%{transform:translate(-7px,8px) rotate(-1deg)} 65%{transform:translate(9px,-6px) rotate(2deg)} }
@keyframes bubbleIn {
  from { transform: scale(0) rotate(-10deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.chip { background: linear-gradient(135deg, rgba(255,107,157,.2), rgba(156,39,176,.2)); border: 1px solid rgba(255,107,157,.3); color: rgba(255,255,255,.85); padding: .3rem .9rem; border-radius: 50px; font-size: .85rem; font-weight: 700; }

/* PARTICIPANT */
.p-page { min-height: 100vh; display: flex; flex-direction: column; }
.p-hdr { background: rgba(0,0,0,.4); backdrop-filter: blur(8px); padding: .6rem 1rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.p-hdr-q { font-weight: 900; color: var(--gold); font-size: .95rem; }
.p-hdr-timer { font-weight: 900; color: white; font-size: 1.2rem; transition: color .3s; }
.p-hdr-timer.urgent { color: var(--A); }
.p-hdr-name { color: rgba(255,255,255,.5); font-size: .8rem; text-align: right; }
.p-q-text { color: white; font-weight: 800; font-size: 1.1rem; text-align: center; padding: .75rem 1rem; flex-shrink: 0; line-height: 1.35; }
.p-answers { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; padding: .75rem; flex: 1; }
.p-btn { border: none; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .35rem; font-family: 'Nunito', sans-serif; font-weight: 800; color: white; font-size: .9rem; cursor: pointer; min-height: 90px; padding: .75rem; text-align: center; transition: transform .1s, opacity .2s; line-height: 1.2; }
.p-btn:active { transform: scale(.96); }
.p-btn:disabled { cursor: not-allowed; }
.p-btn .p-icon { font-size: 1.4rem; }
.p-btn.A { background: var(--A); } .p-btn.B { background: var(--B); }
.p-btn.C { background: var(--C); } .p-btn.D { background: var(--D); }
.p-btn.voted { opacity: .5; }
.p-btn.selected { opacity: 1 !important; outline: 4px solid white; outline-offset: 2px; }
.p-waiting { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
.p-result { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
.result-icon { font-size: 5rem; margin-bottom: .75rem; }
.result-verdict { font-size: 1.4rem; font-weight: 900; color: white; margin-bottom: .5rem; }
.result-pts { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
.result-total { color: rgba(255,255,255,.5); font-size: .9rem; margin-top: .25rem; }
.p-lb-row { display: flex; align-items: center; gap: .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: .6rem .9rem; margin-bottom: .35rem; width: 100%; }
.p-lb-row.me { border-color: var(--gold); background: rgba(255,215,0,.08); }
.p-lb-rank { font-weight: 900; color: var(--gold); min-width: 30px; font-size: 1rem; }
.p-lb-name { flex: 1; color: white; font-size: .95rem; font-weight: 700; }
.p-lb-score { font-weight: 900; color: var(--gold); }

/* JOIN */
.join-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
.join-card { background: rgba(42,26,46,.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,215,0,.2); border-radius: 24px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
.join-card h2 { font-family: 'Pacifico', cursive; color: var(--gold); font-size: 1.4rem; text-align: center; margin-bottom: .5rem; }
.join-sub { color: rgba(255,255,255,.4); text-align: center; font-size: .85rem; margin-bottom: 1.5rem; }

/* ANIMATIONS */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(.8); opacity: 0; } 80% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
@keyframes floatIn { from { opacity: 0; transform: translateY(30px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
.spin { animation: spin 1s linear infinite; }
.pulse { animation: pulse 1.8s ease-in-out infinite; }
.fade-up { animation: fadeUp .4s ease both; }
.pop { animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both; }
.float-in { animation: floatIn .6s cubic-bezier(.22,1,.36,1) both; }
.podium-screen { min-height:100vh; display:flex; flex-direction:column; }
.podium-wrap { position:relative; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; }
.podium-bg { position:absolute; inset:0; background-size:cover; background-position:center; opacity:.85; }
.podium-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(0,0,0,.3) 0%, rgba(0,0,0,.5) 100%); }
.podium-content { position:relative; z-index:2; width:100%; max-width:900px; padding:1rem; }
.podium-title { font-family:Pacifico,cursive; text-align:center; margin-bottom:.75rem; text-shadow:0 2px 12px rgba(0,0,0,.8); }
.podium-blocks { display:flex; align-items:flex-end; justify-content:center; gap:.5rem; }
.podium-slot { display:flex; flex-direction:column; align-items:center; }
.podium-photo { border-radius:50%; object-fit:cover; border:3px solid; box-shadow:0 4px 20px rgba(0,0,0,.6); }
.podium-name { font-weight:800; text-align:center; text-shadow:0 1px 6px rgba(0,0,0,.9); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
.podium-block { border-radius:10px 10px 0 0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:.5rem .5rem .6rem; box-shadow:0 8px 24px rgba(0,0,0,.5); }
.podium-num { font-family:Pacifico,cursive; text-shadow:0 2px 8px rgba(0,0,0,.4); }
.podium-label { font-size:.65rem; font-weight:700; text-align:center; line-height:1.2; margin-top:.1rem; }
.super-intro { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; background: radial-gradient(ellipse at center, rgba(255,215,0,.15) 0%, transparent 70%), var(--navy2); }
.super-title { font-family:'Pacifico',cursive; color:var(--gold); font-size:3rem; text-shadow:0 0 40px rgba(255,215,0,.6); margin-bottom:.5rem; }
.super-subtitle { color:white; font-size:1.2rem; font-weight:700; margin-bottom:2rem; }
.super-photos { display:flex; align-items:center; gap:2rem; margin-bottom:2rem; }
.super-photos img { width:130px; height:130px; object-fit:cover; border-radius:50%; border:4px solid var(--gold); box-shadow:0 0 30px rgba(255,215,0,.4); }
.super-countdown { font-family:'Exo 2',sans-serif; font-size:5rem; font-weight:900; color:var(--gold); text-shadow:0 0 30px rgba(255,215,0,.5); }
.super-badge { background:linear-gradient(135deg,#FFD700,#FFA500); color:var(--dark); font-family:'Exo 2',sans-serif; font-weight:900; font-size:1rem; padding:.4rem 1.2rem; border-radius:50px; display:inline-block; margin-bottom:.75rem; }
.hdr-super { background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,165,0,.1)); border-bottom:1px solid rgba(255,215,0,.3); }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.15); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }

@media (max-width: 640px) {
  .landing-title { font-size: 1.6rem; }
  .q-text-host { font-size: 1.2rem; }
  .mosaic-bg { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); }
  .editor-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>

function genId() {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s;
}

function compressImg(file) {
  return new Promise(res => {
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width, h=img.height, MAX=900;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>550){w=Math.round(w*550/h);h=550;}
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        let q=0.8, d;
        do{ d=c.toDataURL('image/jpeg',q); q-=0.1; } while(d.length>220000 && q>0.15);
        res(d);
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function loadQs() { try { return JSON.parse(localStorage.getItem('bq_questions')||'[]'); } catch{return[];} }
function saveQs(qs) { localStorage.setItem('bq_questions', JSON.stringify(qs)); }
function initQs() {
  const qs=loadQs();
  while(qs.length<30) qs.push({text:'',photos:[],choices:['','','',''],choicePhotos:[null,null,null,null],correct:0});
  return qs.slice(0,30);
}
function isComplete(q) { return q.text.trim() && q.choices.every(c=>c.trim()); }
function isSuperQ(idx) { return (idx+1) % 10 === 0; }
function calcPts(correct, timeLeft, superQ) {
  if(!correct) return 0;
  const base = Math.round(400 + (timeLeft/TIMER)*600);
  return superQ ? base*2 : base;
}
function removeListeners() { G.listeners.forEach(r=>r.off()); G.listeners=[]; clearInterval(G.timerIv); }

  if(confirm(n+'/30 questions prêtes. Lancer la session ?')) launchSession(qs);
}

            <div class="choices-grid">
              ${LABELS.map((l,i)=>{
                const cp=(q.choicePhotos||[])[i];
                return `<div style='background:rgba(0,0,0,.2);border-radius:12px;padding:.6rem;border:1px solid rgba(255,255,255,.1)'>

async function onPhoto(e, idx) {
  const files=Array.from(e.target.files); if(!files.length) return;
  e.target.previousElementSibling.innerHTML='<div style="color:rgba(255,255,255,.4)">⏳ Compression en cours…</div>';
  if(!G.hostQs[idx].photos) G.hostQs[idx].photos=[];
  for(const f of files){
    const d=await compressImg(f);
    G.hostQs[idx].photos.push(d);
  }
  saveQs(G.hostQs); renderEditor(idx);
}

function removePhoto(idx, pi) {
  if(!G.hostQs[idx].photos) return;
  G.hostQs[idx].photos.splice(pi,1);
  saveQs(G.hostQs); renderEditor(idx);
}

function replacePhoto(idx, pi) {
  const inp=$('photoIn'); if(!inp) return;
  const origOnChange = inp.onchange;
  inp.onchange=async(e)=>{
    const f=e.target.files[0]; if(!f){inp.onchange=origOnChange;return;}
    const d=await compressImg(f);
    G.hostQs[idx].photos[pi]=d;
    saveQs(G.hostQs); renderEditor(idx);
    inp.value='';
  };
  inp.click();
}

function triggerChoicePhoto(idx, choiceIdx, replace=false) {
  const inp=$('choicePhotoIn'); if(!inp) return;
  inp.onchange=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    const d=await compressImg(f);
    if(!G.hostQs[idx].choicePhotos) G.hostQs[idx].choicePhotos=[null,null,null,null];
    G.hostQs[idx].choicePhotos[choiceIdx]=d;
    saveQs(G.hostQs); renderEditor(idx);
    inp.value='';
  };
  inp.click();
}

function removeChoicePhoto(idx, choiceIdx) {
  if(!G.hostQs[idx].choicePhotos) return;
  G.hostQs[idx].choicePhotos[choiceIdx]=null;
  saveQs(G.hostQs); renderEditor(idx);
}

function saveCurrentQ() {
  const idx=G.editIdx, qs=G.hostQs;
  if(!$('qTxt')) return;
  qs[idx].text   = $('qTxt').value||'';  qs[idx].choices= [0,1,2,3].map(i=>$('c'+i)?.value||'');
  saveQs(qs);
}

// ─── SESSION LAUNCH ───────────────────────────────────────────────
async function launchSession(qs) {
  const sid=genId(); G.sessionId=sid; G.hostQs=qs; G.mode='host';
  const fbQs=qs.map(q=>({text:q.text||'',choices:q.choices,correct:q.correct||0}));
  await db.ref('sessions/'+sid).set({
    meta:{status:'waiting',currentQuestion:0,createdAt:Date.now()},
    questions:fbQs
  });
  history.pushState({},'','?mode=host&session='+sid);
  renderHostWaiting();
}

// ─── HOST WAITING ─────────────────────────────────────────────────
function renderHostWaiting() {
  const sid=G.sessionId;

  const rawBase = storedBase || (location.origin + location.pathname);

  app().innerHTML=`
  <div style="min-height:100vh;display:flex;flex-direction:column;position:relative">
    <div class="bubble-arena" id="bubbleArena"></div>
    <div class="hdr" style="position:relative;z-index:10">
      <span class="hdr-logo">Tite Fifille Quiz</span>
      <span style="color:var(--gold);font-weight:900;letter-spacing:3px;font-size:1.1rem">${sid}</span>
      <span id="pCnt" style="color:rgba(255,255,255,.5)">0 joueur(s)</span>
    </div>
    <div class="body-center" style="position:relative;z-index:5">
      <div class="waiting-center float-in">
        <div style="font-family:'Pacifico',cursive;color:var(--gold);font-size:1.4rem;margin-bottom:.5rem">📱 Scannez pour rejoindre !</div>
        <div class="qr-box" id="qrWrap"></div>
        <div class="session-url" style="color:rgba(255,255,255,.6);font-size:.85rem;margin-bottom:.5rem">${url}</div>
        <button class="btn btn-ghost" style="font-size:.75rem;padding:.3rem .8rem;margin-bottom:.5rem" onclick="navigator.clipboard.writeText('${url}').then(()=>alert('URL copiée !'))">📋 Copier le lien</button>
        ${location.protocol==='file:' ? `
          <div style='background:rgba(232,65,42,.15);border:1px solid rgba(232,65,42,.4);border-radius:12px;padding:.75rem 1rem;margin:.5rem 0;max-width:500px;text-align:left'>
            <div style='color:#ff6b6b;font-weight:700;font-size:.85rem;margin-bottom:.4rem'>⚠️ Tu es en local — le QR code ne marchera pas sur les téléphones !</div>
            <div style='color:rgba(255,255,255,.6);font-size:.8rem;margin-bottom:.5rem'>Ouvre cette app depuis GitHub Pages ou entre ton URL publique :</div>
            <div style='display:flex;gap:.4rem'>
              <input id='publicUrlIn' type='text' placeholder='https://flavien75009.github.io/TiteFifilleQuiz/' 
                value='${localStorage.getItem("bq_public_url")||""}'  
                style='flex:1;font-size:.8rem;padding:.4rem .6rem'>
              <button class='btn btn-gold' style='padding:.4rem .8rem;font-size:.8rem' onclick='savePublicUrl()'>Sauver</button>
            </div>
          </div>` : ''}

        <div id="chipWrap" class="chips-wrap"></div>
        <button id="startBtn" class="btn btn-gold btn-big" style="margin-top:1.5rem" disabled onclick="startQuiz()">
          En attente de participants…
        </button>
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    const el=$('qrWrap');
    if(el) new QRCode(el,{text:url,width:210,height:210,colorDark:'#2a1a2e',colorLight:'#ffffff'});
  },80);

  const knownPids = new Set();
  const pRef=db.ref('sessions/'+sid+'/participants');
  G.listeners.push(pRef);
  pRef.on('value',snap=>{
    const ps=snap.val()||{}; G.participants=ps;
    const n=Object.keys(ps).length;
    const el=$('pCnt'); if(el) el.textContent=n+' joueur(s)';
    // Add new bubbles for new participants
    const arena=$('bubbleArena');
    Object.entries(ps).forEach(([pid,p])=>{
      if(!knownPids.has(pid) && arena){
        knownPids.add(pid);
        const bubble=document.createElement('div');
        bubble.className='participant-bubble';
        // Bulles partout SAUF sur le QR code (zone centrale)
        const margin = 10;
        const W = window.innerWidth, H = window.innerHeight;
        const qrL = W*0.28, qrR = W*0.72, qrT = H*0.15, qrB = H*0.80;
        let x, y, attempts = 0;
        do {
          x = margin + Math.random()*(W - margin*2 - 90);
          y = margin + Math.random()*(H - margin*2 - 90);
          attempts++;
        } while(attempts < 20 && x > qrL && x < qrR && y > qrT && y < qrB);
        const floatAnim = 'float'+(Math.floor(Math.random()*4));
        const floatDur  = (1.5+Math.random()*1.5).toFixed(1)+'s';
        const floatDelay = (Math.random()*2).toFixed(1)+'s';
        bubble.style.cssText='left:'+x+'px;top:'+y+'px;animation:bubbleIn .5s cubic-bezier(.34,1.56,.64,1) both, '+floatAnim+' '+floatDur+' '+floatDelay+' ease-in-out infinite';
        const imgHtml=p.photo
          ? '<img src="'+p.photo+'" alt="">'
          : '<div style="width:70px;height:70px;border-radius:50%;background:var(--surface);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.8rem">'+(p.emoji||'🎀')+'</div>';
        bubble.innerHTML=imgHtml+'<div class="p-bubble-name">'+(p.emoji||'')+'&nbsp;'+p.name+'</div>';
        arena.appendChild(bubble);
      }
    });
    const btn=$('startBtn');
    if(btn&&n>0){btn.disabled=false;btn.textContent='▶ Démarrer ('+n+') !';}
  });
}

// ─── HOST QUESTION ─────────────────────────────────────────────────
function startQuiz() { removeListeners(); launchQuestion(0); }

function launchQuestion(idx) {
  if(isSuperQ(idx)) { showSuperIntro(idx); }
  else { showQuestion(idx); }
}

function showSuperIntro(idx) {
  db.ref('sessions/'+G.sessionId+'/meta').update({status:'super_intro',currentQuestion:idx});
  app().innerHTML =
    '<div class="super-intro">'+
    '<div class="super-badge">⭐ DOUBLE POINTS ⭐</div>'+
    '<div class="super-title">SUPER QUESTION</div>'+
    '<div class="super-subtitle">Question '+(idx+1)+' — Les points sont DOUBLÉS !</div>'+
    '<div class="super-photos">'+
    '<img src="'+PHOTO_SUPER+'" alt="Axelle" style="width:150px;height:150px">'+
    '<div class="super-countdown" id="sCountdown">3</div>'+
    '<img src="'+PHOTO_SUPER+'" alt="Axelle" style="width:150px;height:150px">'+
    '</div>'+
    '<div style="color:rgba(255,255,255,.5);font-size:.9rem">Préparez-vous !</div>'+
    '</div>';
  let n=3;
  const iv=setInterval(()=>{
    n--;
    const el=document.getElementById('sCountdown');
    if(el){ el.textContent=n>0?n:'GO !'; el.style.color=n<=1?'#E8412A':'var(--gold)'; }
    if(n<=0){clearInterval(iv);showQuestion(idx);}
  },1000);
}

async function showQuestion(idx) {
  G.closingVotes = false;  // reset on new question
  removeListeners(); G.hasVoted=false;
  const q=G.hostQs[idx];
  const startTime=Date.now();
  await db.ref('sessions/'+G.sessionId+'/meta').update({status:'question',currentQuestion:idx,questionStartTime:startTime});
  const pCount=Object.keys(G.participants).length;
  const allPhotos=(q.choicePhotos||[]).filter(Boolean).length===4;

  // Build answer section HTML separately to avoid nested template literal issues
  let answerHtml = '';
  if(allPhotos) {
    const BG=['#E8412A','#2980E8','#F0A500','#1DA85C'];
    answerHtml = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;width:100%;max-width:900px;margin-bottom:.6rem">';
    q.choices.forEach((c,i)=>{
      const cp=q.choicePhotos[i];
      answerHtml += '<div style="background:'+BG[i]+';border-radius:14px;overflow:hidden;display:flex;flex-direction:column">';
      answerHtml += '<div style="display:flex;align-items:center;gap:.4rem;color:white;font-weight:800;padding:.4rem .7rem">';
      answerHtml += '<div style="width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ICONS[i]+'</div>';
      answerHtml += '<span>'+LABELS[i]+(c?' — '+c:'')+'</span></div>';
      answerHtml += '<img src="'+cp+'" style="width:100%;height:170px;object-fit:contain;background:rgba(0,0,0,.25)" alt="">';
      answerHtml += '</div>';
    });
    answerHtml += '</div>';
    answerHtml += '<div class="q-text-host" style="font-size:1.3rem;margin-bottom:.4rem">'+q.text+'</div>';
  } else {
    let photoHtml = '';
    if(q.photos&&q.photos.length) {
      photoHtml = '<div class="photos-row">'+q.photos.map(p=>'<img src="'+p+'" class="q-photo-host" alt="">').join('')+'</div>';
    }
    let choicesHtml = '<div class="answers-host">';
    q.choices.forEach((c,i)=>{
      const cp=(q.choicePhotos||[])[i];
      if(cp) {
        choicesHtml += '<div class="ans-host ans-'+LABELS[i]+' ans-photo">';
        choicesHtml += '<div style="display:flex;align-items:center;gap:.4rem;width:100%"><div class="ans-icon">'+ICONS[i]+'</div><span style="font-size:.8rem;opacity:.9">'+(c||'')+'</span></div>';
        choicesHtml += '<img src="'+cp+'" alt=""></div>';
      } else {
        choicesHtml += '<div class="ans-host ans-'+LABELS[i]+'"><div class="ans-icon">'+ICONS[i]+'</div><span>'+c+'</span></div>';
      }
    });
    choicesHtml += '</div>';
    answerHtml = photoHtml + '<div class="q-text-host">'+q.text+'</div>' + choicesHtml;
  }

  const superQ = isSuperQ(idx);
  app().innerHTML=`
  <div class="q-screen">
    <div class="hdr ${superQ?'hdr-super':''}">
      <span class="hdr-logo">${superQ?'⭐ SUPER QUESTION ⭐':'Tite Fifille Quiz'}</span>
      <span style="color:${superQ?'var(--gold)':'white'};font-weight:900;font-size:1.1rem">Q.${idx+1} / 30${superQ?' — x2 pts':''}</span>
      <div id="timerBadge" class="timer-badge">${TIMER}s</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:100%"></div></div>
    <div class="q-body">
      ${answerHtml}
      <div class="vote-ticker" id="voteTick">0 / ${pCount} votes</div>
      <button class="btn btn-ghost" style="margin-top:.75rem;font-size:.85rem" onclick="closeVotes(${idx})">Fermer les votes</button>
    </div>
  </div>`;

  let rem=TIMER;
  G.timerIv=setInterval(()=>{
    rem--;
    const pb=$('progFill'), tb=$('timerBadge');
    if(pb) pb.style.width=(rem/TIMER*100)+'%';
    if(tb){tb.textContent=rem+'s'; if(rem<=5)tb.classList.add('urgent');}
    if(rem<=0){ clearInterval(G.timerIv); closeVotes(idx); return; }
  },1000);

  const vRef=db.ref('sessions/'+G.sessionId+'/votes/'+idx);
  G.listeners.push(vRef);
  vRef.on('value',snap=>{
    const n=Object.keys(snap.val()||{}).length;
    const el=$('voteTick'); if(el) el.textContent=n+' / '+pCount+' votes';
  });
}

async function closeVotes(idx) {
  if(G.closingVotes) return;  // prevent double-call
  G.closingVotes = true;
  clearInterval(G.timerIv);
  removeListeners();
  const q = G.hostQs[idx];
  const superQ = isSuperQ(idx);
  const BG = ['#E8412A','#2980E8','#F0A500','#1DA85C'];

  const [vSnap,pSnap] = await Promise.all([
    db.ref('sessions/'+G.sessionId+'/votes/'+idx).once('value'),
    db.ref('sessions/'+G.sessionId+'/participants').once('value')
  ]);
  const votes=vSnap.val()||{}, parts=pSnap.val()||{};
  G.participants=parts;

  const counts=[0,0,0,0], updates={};
  for(const [pid,vd] of Object.entries(votes)){
    const ch=typeof vd==='object'?vd.choice:vd;
    const tl=typeof vd==='object'?(vd.time||0):0;
    if(ch>=0&&ch<=3) counts[ch]++;
    const pts=calcPts(ch===q.correct,tl,getQMultiplier(idx));
    const cur=(parts[pid]&&parts[pid].score)||0;
    updates['sessions/'+G.sessionId+'/participants/'+pid+'/score']=cur+pts;
    updates['sessions/'+G.sessionId+'/participants/'+pid+'/lastPts']=pts;
  }
  if(Object.keys(updates).length) await db.ref().update(updates);
  await db.ref('sessions/'+G.sessionId+'/meta').update({status:'showing_answer',currentQuestion:idx});
  G.voteHistory[idx]={correct:q.correct,votes:{...votes}};

  const pSnap2=await db.ref('sessions/'+G.sessionId+'/participants').once('value');
  G.participants=pSnap2.val()||{};
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;

  // Voter avatars per choice
  const votersByChoice=[[],[],[],[]];
  Object.entries(votes).forEach(([pid,vd])=>{
    const ch=typeof vd==='object'?vd.choice:vd;
    if(ch>=0&&ch<=3) votersByChoice[ch].push(G.participants[pid]||{});
  });

  function voterAvatars(list){
    return list.slice(0,5).map(p=>{
      if(p.photo) return '<img src="'+p.photo+'" style="width:24px;height:24px;object-fit:cover;border-radius:50%;border:1px solid white;margin-left:-4px;flex-shrink:0">';
      return '<div style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid white;display:flex;align-items:center;justify-content:center;font-size:.65rem;margin-left:-4px;flex-shrink:0">'+(p.emoji||'?')+'</div>';
    }).join('');
  }

  // Build result rows — all tracks same width, correct row outlined green
  let resHtml = '<div class="results-wrap">';
  q.choices.forEach((c,i)=>{
    const pct=Math.round(counts[i]/total*100);
    const ok=i===q.correct;
    const cp=(q.choicePhotos||[])[i];
    resHtml += '<div class="'+(ok?'result-row correct-row':'result-row')+'" style="margin-bottom:.5rem">';
    resHtml += '<div class="result-letter" style="background:'+BG[i]+'">'+LABELS[i]+'</div>';
    if(cp) resHtml += '<img src="'+cp+'" style="width:34px;height:34px;object-fit:cover;border-radius:6px;flex-shrink:0">';
    resHtml += '<div class="result-track" style="flex:1"><div class="result-bar" style="width:'+pct+'%;background:'+(ok?'#1DA85C':BG[i])+'">'+( pct>18?(cp?'':c):'' )+'</div></div>';
    resHtml += '<div class="result-n">'+counts[i]+'</div>';
    if(votersByChoice[i].length>0) resHtml += '<div style="display:flex;align-items:center;min-width:28px">'+voterAvatars(votersByChoice[i])+'</div>';
    resHtml += '</div>';
  });
  resHtml += '</div>';

  // Photo illustration
  let photoHtml='';
  const allChoicePhotos=(q.choicePhotos||[]).filter(Boolean).length===4;
  if(q.photos&&q.photos.length&&!allChoicePhotos){
    photoHtml='<div class="photos-row" style="max-height:140px">'+
      q.photos.map(p=>'<img src="'+p+'" style="flex:1;min-width:0;max-height:135px;object-fit:contain;border-radius:10px;background:rgba(0,0,0,.3)">').join('')+
      '</div>';
  }

  const isMajorLB=(idx+1)%10===0;
  const nextBtn=isMajorLB
    ? '<button class="btn btn-gold btn-big" onclick="showLeaderboard('+idx+')">&#127942; Voir le classement</button>'
    : '<button class="btn btn-pink btn-big" onclick="showMiniLeaderboard('+idx+')">&#128202; Classement &amp; suite</button>';

  G.closingVotes = false;  // reset guard
  app().innerHTML=
    '<div class="q-screen">'+
    '<div class="hdr">'+

async function exportPDF() {
  const qs = G.hostQs;
  const parts = G.participants;
  const history = G.voteHistory;

  let rows = '';
  qs.forEach((q, i) => {
    if(!q.text) return;
    const vh = history[i]||{correct:q.correct,votes:{}};
    const votes = vh.votes||{};
    const correct = q.correct;
    const rightNames=[], wrongNames=[];
    Object.entries(votes).forEach(([pid,vd])=>{
      const ch=typeof vd==='object'?vd.choice:vd;
      const name=(parts[pid]&&parts[pid].name)||'?';
      (ch===correct?rightNames:wrongNames).push(name);
    });
    const allNames = Object.values(parts).map(p=>p.name);
    const voted = [...rightNames,...wrongNames];
    const noVote = allNames.filter(n=>!voted.includes(n));
    const superQ=(i+1)%10===0;
    rows += '<tr style="background:'+(i%2===0?'#f9f9f9':'white')+'">';
    rows += '<td style="padding:.4rem .6rem;font-weight:700;color:#333;width:28px">'+(i+1)+(superQ?' ⭐':'')+'</td>';
    rows += '<td style="padding:.4rem .6rem;font-weight:600">'+q.text+'</td>';
    let ch2='';
    q.choices.forEach((c,ci)=>{
      const ok=ci===correct;
      ch2+='<span style="display:inline-block;margin:.1rem;padding:.15rem .4rem;border-radius:4px;font-size:.75rem;background:'+(ok?'#1DA85C':'#eee')+';color:'+(ok?'white':'#555')+'">'+['A','B','C','D'][ci]+'. '+c+(ok?' ✓':'')+'</span>';
    });
    rows += '<td style="padding:.4rem .6rem">'+ch2+'</td>';
    rows += '<td style="padding:.4rem .6rem;color:#1DA85C;font-size:.8rem">'+rightNames.join(', ')+'</td>';
    rows += '<td style="padding:.4rem .6rem;color:#E8412A;font-size:.8rem">'+wrongNames.join(', ')+(noVote.length?'<br><em style="color:#999">Absent: '+noVote.join(', ')+'</em>':'')+'</td>';
    rows += '</tr>';
  });

  const sorted=Object.values(parts).sort((a,b)=>(b.score||0)-(a.score||0));
  const lbRows=sorted.map((p,i)=>'<tr><td>'+(i+1)+'</td><td>'+p.name+'</td><td style="text-align:right;font-weight:700">'+(p.score||0).toLocaleString()+' pts</td></tr>').join('');

  const win=window.open('','_blank');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bilan Quiz Tite Fifille</title>'+
    '<style>body{font-family:Arial,sans-serif;margin:2rem;color:#222}h1{color:#9C27B0}h2{color:#555;margin:1.5rem 0 .5rem}table{width:100%;border-collapse:collapse;font-size:.85rem}th{background:#9C27B0;color:white;padding:.4rem .6rem;text-align:left}td{border-bottom:1px solid #eee;vertical-align:top;padding:.3rem .5rem}@media print{body{margin:.5rem}}</style>'+
    '</head><body>'+
    '<h1>&#127928; Bilan — Connaissez-vous vraiment Tite Fifille ?</h1>'+
    '<p style="color:#666;font-size:.85rem">Export&#233; le '+new Date().toLocaleDateString('fr-FR')+' — '+qs.filter(q=>q.text).length+' questions — '+sorted.length+' participants</p>'+
    '<h2>&#128202; Classement final</h2>'+
    '<table><thead><tr><th>#</th><th>Nom</th><th>Score</th></tr></thead><tbody>'+lbRows+'</tbody></table>'+
    '<h2>&#128203; D&#233;tail des questions</h2>'+
    '<table><thead><tr><th>N&#176;</th><th>Question</th><th>R&#233;ponses</th><th>&#10003; Bonne</th><th>&#10007; Faux</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<p style="color:#999;font-size:.75rem;margin-top:1rem">&#11088; = Super Question (points doubl&#233;s)</p>'+
    '<scr'+'ipt>window.onload=()=>window.print();</scr'+'ipt>'+
    '</body></html>');
  win.document.close();
}

async function doJoin() {
  const n=$('nameIn')?.value.trim(); if(!n){alert('Entrez votre prénom !');return;}
  G.pName=n;
  const emojiIdx = PID.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % EMOJIS.length;
  G.pEmoji = EMOJIS[emojiIdx];
  const pData = {name:n, score:0, emoji:G.pEmoji, joinedAt:Date.now()};
  if(G.selfieData) pData.photo = G.selfieData;
  await db.ref('sessions/'+G.sessionId+'/participants/'+PID).set(pData);
  renderPWaiting();
}

  app().innerHTML=`
  <div class="p-page">
    <div class="hdr"><span class="hdr-logo">Tite Fifille Quiz</span><span style="color:rgba(255,255,255,.7);font-size:1rem">${G.pEmoji||'🎀'} ${G.pName}</span></div>
    <div class="p-waiting">
      <div class="spinner" style="margin-bottom:1.5rem"></div>
      <div style="color:white;font-size:1.2rem;font-weight:800;margin-bottom:.5rem" class="pulse">En attente du début…</div>
      <div id="pCntP" style="color:rgba(255,255,255,.3);font-size:.85rem"></div>
    </div>
  </div>`;

  const mRef=db.ref('sessions/'+G.sessionId+'/meta');
  G.listeners.push(mRef);
  mRef.on('value',snap=>{
    const m=snap.val(); if(!m) return;
    if(m.status==='super_intro'){showPSuperIntro(m.currentQuestion);}
    else if(m.status==='question'){removeListeners();renderPQuestion(m.currentQuestion,m.questionStartTime);}
    else if(m.status==='leaderboard'){renderPLeaderboard(m.leaderboard||[]);}
  });

  const pRef=db.ref('sessions/'+G.sessionId+'/participants');
  G.listeners.push(pRef);
  pRef.on('value',snap=>{
    const el=$('pCntP'); if(el) el.textContent=Object.keys(snap.val()||{}).length+' joueur(s) connecté(s)';
  });
}

async function renderPQuestion(idx, startTime) {
  G.hasVoted=false; G.myVote=null;
  const qSnap=await db.ref('sessions/'+G.sessionId+'/questions/'+idx).once('value');
  const q=qSnap.val(); if(!q){renderPWaiting();return;}
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  let rem=Math.max(0,TIMER-elapsed);

  app().innerHTML=`
  <div class="p-page">
    <div class="p-hdr">
      <span class="p-hdr-q">Q.${idx+1}/30</span>
      <span class="p-hdr-timer" id="pTime">${rem}s</span>
      <span class="p-hdr-name">${G.pName}<br><span style="color:var(--gold)">${G.pScore.toLocaleString()} pts</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pProg" style="width:${rem/TIMER*100}%"></div></div>
    <div class="p-q-text">${q.text}</div>
    ${ (q.choicePhotos||[]).filter(Boolean).length===4
      ? `<div class='photo-choice-grid'>
          ${q.choices.map((c,i)=>{
            const cp=q.choicePhotos[i];
            const bg=['#E8412A','#2980E8','#F0A500','#1DA85C'][i];
            return `<button class='photo-choice-btn' id='pb${i}' onclick='castVote(${idx},${i},${startTime})' style='border:3px solid ${bg}'>
              <div class='choice-corner' style='background:${bg}'>${LABELS[i]}</div>
              <img src='${cp}' alt=''>
              ${c?`<div style='color:white;font-size:.75rem;font-weight:700;margin-top:.25rem;text-align:center'>${c}</div>`:''}
            </button>`;
          }).join('')}
        </div>`
      : `<div class='p-answers'>
          ${q.choices.map((c,i)=>{
            const cp=(q.choicePhotos||[])[i];
            if(cp) return `<button class='p-btn ${LABELS[i]} p-btn-photo' id='pb${i}' onclick='castVote(${idx},${i},${startTime})'>
              <span style='font-size:.8rem;font-weight:800'>${ICONS[i]} ${LABELS[i]}</span>
              <img src='${cp}' alt=''>
              ${c?`<span class='p-label'>${c}</span>`:''}
            </button>`;
            return `<button class='p-btn ${LABELS[i]}' id='pb${i}' onclick='castVote(${idx},${i},${startTime})'>
              <span class='p-icon'>${ICONS[i]}</span>
              <span>${c}</span>
            </button>`;
          }).join('')}
        </div>`
    }
  </div>`;

  G.timerIv=setInterval(()=>{
    rem--;
    const pp=$('pProg'), pt=$('pTime');
    if(pp) pp.style.width=(rem/TIMER*100)+'%';
    if(pt){pt.textContent=rem+'s'; if(rem<=5)pt.classList.add('urgent');}
    if(rem<=0) clearInterval(G.timerIv);
  },1000);

  const mRef=db.ref('sessions/'+G.sessionId+'/meta');
  G.listeners.push(mRef);
  mRef.on('value',snap=>{
    const m=snap.val(); if(!m) return;
    if(m.status==='showing_answer'&&m.currentQuestion===idx){clearInterval(G.timerIv);removeListeners();renderPResult(idx,q);}
    else if(m.status==='question'&&m.currentQuestion!==idx){clearInterval(G.timerIv);removeListeners();renderPQuestion(m.currentQuestion,m.questionStartTime);}
    else if(m.status==='leaderboard'){clearInterval(G.timerIv);removeListeners();renderPLeaderboard(m.leaderboard||[]);}
    else if(m.status==='ended'){clearInterval(G.timerIv);removeListeners();renderPEnd();}
  });
}

async function castVote(idx, choice, startTime) {
  if(G.hasVoted) return;
  G.hasVoted=true; G.myVote=choice;
  const tl=Math.max(0,TIMER-Math.floor((Date.now()-startTime)/1000));
  [0,1,2,3].forEach(i=>{
    const b=$('pb'+i); if(!b) return;
    b.disabled=true;
    b.classList.add(i===choice?'selected':'voted');
  });
  // Also handle photo-choice-btn
  document.querySelectorAll('.photo-choice-btn').forEach((b,i)=>{
    b.disabled=true;
    b.classList.add(i===choice?'selected':'voted');
  });
  await db.ref('sessions/'+G.sessionId+'/votes/'+idx+'/'+PID).set({choice,time:tl});
}

async function renderPResult(idx, q) {
  clearInterval(G.timerIv);
  const pSnap=await db.ref('sessions/'+G.sessionId+'/participants/'+PID).once('value');
  const pd=pSnap.val()||{}; G.pScore=pd.score||0;
  const pts=pd.lastPts||0;
  const prevScore = G.pScore; // before update
  const ok=G.hasVoted&&G.myVote===q.correct;
  const feedbackPhoto = (!G.hasVoted||!ok) ? PHOTO_WRONG : PHOTO_CORRECT;
  const feedbackMsg   = !G.hasVoted ? 'Trop lent... !' : ok ? 'Cacou est fiere de vous ! !' : 'Ahahah vous ne connaissez pas Pedro ! !';

  const superQ = isSuperQ(idx);
  const ptsHtml = pts>0
    ? '<div class="result-pts pop">'+(superQ?'⭐ ':'')+'+'+pts+' pts'+(superQ?' (x2)':'')+'</div>'
    : '<div style="color:rgba(255,255,255,.4);font-size:1.1rem;margin:.5rem 0">+0 pts</div>';
  const borderColor = ok ? '#1DA85C' : '#E8412A';

  app().innerHTML =
    '<div class="p-page">' +
    '<div class="hdr"><span class="hdr-logo">Tite Fifille Quiz</span><span style="color:rgba(255,255,255,.5)">Q.'+(idx+1)+'/30</span></div>' +
    '<div class="p-result">' +
    '<img src="'+feedbackPhoto+'" class="pop" style="width:160px;height:160px;object-fit:cover;border-radius:50%;border:4px solid '+borderColor+';margin-bottom:.75rem;box-shadow:0 4px 24px rgba(0,0,0,.5)">' +
    '<div class="result-verdict">'+feedbackMsg+'</div>' +
    ptsHtml +
    '<div class="result-total" style="font-size:1.1rem;font-weight:800;color:white">Total : '+G.pScore.toLocaleString()+' pts</div>' +
    '<div style="color:rgba(255,255,255,.35);font-size:.8rem;margin-top:.25rem">Score avant : '+prevScore.toLocaleString()+' pts</div>' +
    '<div style="color:rgba(255,255,255,.3);margin-top:1.5rem;font-size:.9rem" class="pulse">En attente de la prochaine question...</div>' +
    '</div></div>';

  const mRef=db.ref('sessions/'+G.sessionId+'/meta');
  G.listeners.push(mRef);
  mRef.on('value',snap=>{
    const m=snap.val(); if(!m) return;
    if(m.status==='question'){removeListeners();renderPQuestion(m.currentQuestion,m.questionStartTime);}
    else if(m.status==='leaderboard'||m.status==='mini_leaderboard'){removeListeners();renderPLeaderboard(m.leaderboard||[]);}
    else if(m.status==='ended'){removeListeners();renderPEnd();}
  });
}

async function renderPLeaderboard(lb) {
  const allSnap=await db.ref('sessions/'+G.sessionId+'/participants').once('value');
  const all=allSnap.val()||{};
  const sorted=Object.entries(all).map(([id,p])=>({id,name:p.name,score:p.score||0})).sort((a,b)=>b.score-a.score);
  const myRank=sorted.findIndex(p=>p.id===PID)+1;
  G.pScore=(all[PID]&&all[PID].score)||0;

  app().innerHTML=`
  <div class="p-page">
    <div class="hdr"><span class="hdr-logo">Tite Fifille Quiz</span><span style="color:var(--gold);font-weight:900">🏆 Classement</span></div>
    <div class="p-waiting" style="gap:.5rem">
      <div style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:18px;padding:1rem 2rem;text-align:center;margin-bottom:1rem">
        <div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-bottom:.25rem">Ta position</div>
        <div style="font-size:2.5rem;font-weight:900;color:var(--gold)">${myRank>0?'#'+myRank:'?'}</div>
        <div style="color:white;font-weight:800">${G.pScore.toLocaleString()} pts</div>
      </div>
      <div style="width:100%;max-width:360px">
        ${sorted.slice(0,6).map((p,i)=>`
          <div class="p-lb-row ${p.id===PID?'me':''}">
            <div class="p-lb-rank">${['🥇','🥈','🥉','4.','5.','6.'][i]}</div>
            <div class="p-lb-name">${p.name}${p.id===PID?' 👈':''}</div>
            <div class="p-lb-score">${p.score.toLocaleString()}</div>
          </div>`).join('')}
      </div>
      <div style="color:rgba(255,255,255,.3);margin-top:1rem;font-size:.85rem" class="pulse">En attente de la suite…</div>
    </div>
  </div>`;

  const mRef=db.ref('sessions/'+G.sessionId+'/meta');
  G.listeners.push(mRef);
  mRef.on('value',snap=>{
    const m=snap.val(); if(!m) return;
    if(m.status==='question'){removeListeners();renderPQuestion(m.currentQuestion,m.questionStartTime);}
    else if(m.status==='ended'){removeListeners();renderPEnd();}
  });
}

function renderPEnd() {
  app().innerHTML=`
  <div class="p-page">
    <div class="hdr"><span class="hdr-logo">Tite Fifille Quiz</span></div>
    <div class="p-result">
      <div class="result-icon pop">🎀</div>
      <div class="result-verdict">Quiz terminé !</div>
      <div class="result-pts">${G.pScore.toLocaleString()} pts</div>
      <div class="result-total">Merci d'avoir joué 🎉</div>
    </div>
  </div>`;
}

// ─── ROUTER ───────────────────────────────────────────────────────
(function init() {
  const p=new URLSearchParams(location.search);
  const sid=p.get('session'), mode=p.get('mode');
  if(sid&&mode==='host'){G.sessionId=sid;G.mode='host';G.hostQs=initQs();renderHostWaiting();}
  else if(sid){G.sessionId=sid;G.mode='participant';renderJoin();}
  else{renderLanding();}
})();
</script>
</body>
</html>
